name: Validate Registry

on:
  pull_request:
    paths:
      - "registry/**"
      - "schemas/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/validate-registry.yml"
  push:
    branches:
      - main
    paths:
      - "registry/**"
      - "schemas/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/validate-registry.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm run validate

